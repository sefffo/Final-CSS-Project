<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookNest - Contact</title>
  <link rel="stylesheet" href="contact.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">📚 BookNest</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="books.html">Books</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>Contact Us 📬</h1>
    <p>We'd love to hear from you!</p>
  </div>

  <!-- CONTACT SECTION -->
  <section class="contact-section">

    <!-- INFO CARDS -->
    <div class="info-cards">
      <div class="info-card">
        <span>📧</span>
        <h3>Email</h3>
        <p>hello@booknest.com</p>
      </div>
      <div class="info-card">
        <span>📞</span>
        <h3>Phone</h3>
        <p>+20 100 000 0000</p>
      </div>
      <div class="info-card">
        <span>📍</span>
        <h3>Address</h3>
        <p>Cairo, Egypt</p>
      </div>
    </div>

    <!-- CONTACT FORM -->
    <form class="contact-form">
      <h2>Send a Message</h2>

      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="e.g. Ahmed" />

      <label for="email">Your Email</label>
      <input type="email" id="email" placeholder="e.g. ahmed@email.com" />

      <label for="message">Message</label>
      <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>

      <button type="submit" class="btn">Send Message 🚀</button>
    </form>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 BookNest. Made with ❤️ for learners.</p>
  </footer>

</body>
</html>
